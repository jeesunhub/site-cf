<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>결제 추가 - Sugar</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .form-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .form-section {
            background: transparent;
            border: none;
            padding: 0;
            margin-bottom: 0.5rem;
        }

        .form-section h2 {
            font-size: 1rem;
            margin-bottom: 0.12rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--primary);
            margin-top: 0;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.8rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.02rem;
        }

        .form-group label {
            font-size: 0.8rem;
            color: #94a3b8;
            font-weight: 400;
            opacity: 1;
            margin-bottom: 0.3rem;
        }

        .form-group input,
        .form-group select {
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.8rem;
            border-radius: 0.8rem;
            color: #f8fafc;
            font-size: 1rem;
            font-family: inherit;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: var(--primary);
            outline: none;
            background: rgba(255, 255, 255, 0.08);
        }

        .form-group select:disabled {
            opacity: 0.5;
        }

        .warning-box {
            margin-top: 0.8rem;
            padding: 0.8rem;
            background: rgba(245, 158, 11, 0.1);
            border-radius: 0.5rem;
            font-size: 0.75rem;
            color: #fbbf24;
        }

        .result-box {
            display: none;
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 0.5rem;
            font-size: 0.85rem;
        }

        .action-btns {
            display: flex;
            gap: 0.4rem;
            margin-top: 2rem;
            padding-bottom: 2rem;
        }

        .btn {
            flex: 1;
            height: 3.2rem;
            padding: 0 1rem;
            border-radius: 0.8rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .btn-cancel {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .btn-submit {
            background: rgba(99, 102, 241, 0.3);
            color: white;
            border: 1px solid rgba(99, 102, 241, 0.4);
        }

        .btn-submit:hover {
            background: rgba(99, 102, 241, 0.45);
            border-color: rgba(99, 102, 241, 0.6);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.2);
        }

        .btn-submit:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 1.5rem;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 70px;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            height: 3.5rem;
            margin-bottom: 0.5rem;
        }

        .header h1 {
            font-size: 1.25rem;
            margin: 0;
            background: linear-gradient(to right, #6366f1, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            margin: 0 !important;
            padding-top: 0.5rem;
        }
    </style>
</head>

<body class="has-back-button">
    <header id="layout-header"></header>

    <div class="header" id="sticky-header">
        <h1 id="page-title">결제 추가</h1>
    </div>

    <div class="container" id="main-content">
        <form onsubmit="saveManualPayment(event)">
            <div class="form-container">
                <div class="form-section">
                    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.05); margin-bottom: 0.12rem; padding-bottom: 0.5rem;">
                        <h2 style="border:none; margin:0; padding:0;">💰 납부 정보</h2>
                    </div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>건물 <span style="color:#ef4444">*</span></label>
                            <select id="mp-building" onchange="loadRoomsForBuilding()">
                                <option value="">건물을 선택하세요</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>호수 <span style="color:#ef4444">*</span></label>
                            <select id="mp-room" onchange="onRoomSelected()" disabled>
                                <option value="">건물을 먼저 선택하세요</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>날짜 <span style="color:#ef4444">*</span></label>
                            <input type="date" id="mp-date" required>
                        </div>
                        <div class="form-group">
                            <label>시간 <span style="color:#ef4444">*</span></label>
                            <input type="time" id="mp-time" required>
                            <div style="font-size:0.75rem; color:rgba(255,255,255,0.4); margin-top:0.3rem;">
                                * PDF 첨부 시 중복 방지를 위해 시간 설정이 필요합니다.
                            </div>
                        </div>
                        <div class="form-group">
                            <label>금액 (원) <span style="color:#ef4444">*</span></label>
                            <input type="number" id="mp-amount" placeholder="300000" required>
                        </div>
                        <div class="form-group">
                            <label>메모 (선택)</label>
                            <input type="text" id="mp-memo" placeholder="현금 수령 등">
                        </div>
                    </div>
                </div>

                <div class="warning-box">
                    ⚠ 이 납부가 기존 납부 사이에 삽입되면 이후 납부의 Invoice 배정이 자동 조정됩니다.
                </div>

                <div id="mp-result" class="result-box"></div>

                <div class="action-btns">
                    <button type="button" class="btn btn-cancel" onclick="window.location.href='payments.html'">취소</button>
                    <button type="submit" class="btn btn-submit" id="mp-save-btn">저장 및 배정</button>
                </div>
            </div>
        </form>
    </div>

    <footer id="layout-footer">
        <div class="footer-container" style="flex-wrap: wrap;">
            <div class="footer-biz-name" onclick="toggleFooterInfo()">상호명: 김지선, 김세미 부동산</div>
            <div class="footer-links">
                <a href="/terms.html" class="footer-btn" style="text-decoration: none;">이용약관</a>
                <a href="/privacy.html" class="footer-btn" style="text-decoration: none;">개인정보처리방침</a>
            </div>
            <div id="footer-biz-details" class="footer-info-details">
                상호명: 김지선, 김세미 부동산<br>
                대표자명: 김지선외 1명<br>
                사업자등록번호: 640-31-00762<br>
                주소: 경기도 수원시 팔달구 우만동 89-5 GS지에스타워 403호
            </div>
        </div>
    </footer>

    <script src="/js/common.js"></script>
    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        let mpContractId = null;

        document.addEventListener('DOMContentLoaded', async () => {
            if (!user) { window.location.href = '/index.html'; return; }
            if (user.role === 'tenant') { window.location.href = 'payments_monthly.html'; return; }

            renderNavbar();

            const navBack = document.querySelector('.nav-back-btn');
            if (navBack) {
                navBack.onclick = (e) => {
                    e.preventDefault();
                    window.location.href = 'payments.html';
                };
            }

            await initPage();
        });

        async function initPage() {
            const now = new Date();
            document.getElementById('mp-date').value = now.toISOString().slice(0, 10);
            document.getElementById('mp-time').value = now.toTimeString().slice(0, 5);
            document.getElementById('mp-amount').value = '';
            document.getElementById('mp-memo').value = '';
            document.getElementById('mp-result').style.display = 'none';

            const select = document.getElementById('mp-building');
            select.innerHTML = '<option value="">건물을 선택하세요</option>';
            document.getElementById('mp-room').innerHTML = '<option value="">건물을 먼저 선택하세요</option>';
            document.getElementById('mp-room').disabled = true;

            try {
                const res = await fetch(`/api/buildings/for-user?user_id=${user.id}&role=${user.role}`);
                if (res.ok) {
                    const buildings = await res.json();
                    buildings.forEach(b => {
                        const opt = document.createElement('option');
                        opt.value = b.id;
                        opt.textContent = b.name;
                        select.appendChild(opt);
                    });
                }
            } catch (e) {
                console.error('Failed to load buildings', e);
            }
        }

        async function loadRoomsForBuilding() {
            const buildingId = document.getElementById('mp-building').value;
            const roomSelect = document.getElementById('mp-room');
            roomSelect.innerHTML = '<option value="">호수를 선택하세요</option>';
            mpContractId = null;

            if (!buildingId) {
                roomSelect.disabled = true;
                return;
            }

            roomSelect.disabled = false;
            try {
                const res = await fetch(`/api/buildings/${buildingId}/rooms`);
                if (res.ok) {
                    const rooms = await res.json();
                    rooms.forEach(r => {
                        const opt = document.createElement('option');
                        opt.value = r.contract_id || '';
                        opt.textContent = `${r.room_number}호${r.tenant_name ? ' (' + r.tenant_name + ')' : ''}`;
                        roomSelect.appendChild(opt);
                    });
                }
            } catch (e) {
                console.error('Failed to load rooms', e);
            }
        }

        function onRoomSelected() {
            mpContractId = document.getElementById('mp-room').value;
        }

        async function saveManualPayment(event) {
            event.preventDefault();

            const contractId = mpContractId || document.getElementById('mp-room').value;
            const paidDate = document.getElementById('mp-date').value;
            const paidTime = document.getElementById('mp-time').value;
            const paidAt = paidDate + 'T' + (paidTime || '12:00');
            const amount = parseInt(document.getElementById('mp-amount').value);
            const memo = document.getElementById('mp-memo').value;

            if (!contractId) return alert('건물과 호수를 선택하세요.');
            if (!paidDate) return alert('날짜를 선택하세요.');
            if (!paidTime) return alert('시간을 선택하세요.');
            if (!amount || amount <= 0) return alert('올바른 금액을 입력하세요.');

            const btn = document.getElementById('mp-save-btn');
            btn.textContent = '저장 중...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/payments/manual', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: user.id,
                        contract_id: parseInt(contractId),
                        paid_at: paidAt,
                        amount: amount,
                        memo: memo || '수동 추가'
                    })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || '저장 실패');

                const resultDiv = document.getElementById('mp-result');
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = `
                    <div style="color:#10b981; font-weight:600;">✅ 저장 완료</div>
                    <div style="margin-top:0.5rem;">
                        Payment ID: ${data.payment_id}<br>
                        Invoice 재배정: ${data.reallocation?.reallocated ? '완료' : '없음'}<br>
                        배정 건수: ${data.reallocation?.allocation_count || 0}건
                    </div>
                `;

                btn.textContent = '저장 및 배정';
                btn.disabled = false;

                setTimeout(() => {
                    window.location.href = 'payments.html';
                }, 2000);
            } catch (e) {
                alert('저장 오류: ' + e.message);
                btn.textContent = '저장 및 배정';
                btn.disabled = false;
            }
        }
    </script>
</body>

</html>
