<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>결제 추가 - Sugar</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .header-section {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 1.5rem;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            height: 3.5rem;
        }

        .header-section h1 {
            font-size: 1.25rem !important;
            margin: 0;
            background: linear-gradient(to right, #6366f1, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            white-space: nowrap;
        }

        .container {
            max-width: 500px;
            margin: 0 auto;
            padding: 1.5rem;
            width: 100%;
            box-sizing: border-box;
        }

        .form-section {
            background: var(--card-bg);
            border-radius: 1rem;
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }

        .form-group label {
            font-size: 0.8rem;
            opacity: 0.6;
        }

        .form-group select,
        .form-group input {
            width: 100%;
            padding: 0.6rem;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.5rem;
            color: #fff;
            font-size: 0.9rem;
            box-sizing: border-box;
        }

        .form-group select:disabled {
            opacity: 0.5;
        }

        .warning-box {
            margin-top: 0.8rem;
            padding: 0.8rem;
            background: rgba(245, 158, 11, 0.1);
            border-radius: 0.5rem;
            font-size: 0.75rem;
            color: #fbbf24;
        }

        .result-box {
            display: none;
            margin-top: 1rem;
            padding: 1rem;
            background: rgba(16, 185, 129, 0.1);
            border-radius: 0.5rem;
            font-size: 0.85rem;
        }

        .btn-group {
            margin-top: 1.5rem;
            display: flex;
            justify-content: flex-end;
            gap: 1rem;
        }

        .btn {
            height: 2.5rem;
            padding: 0 1.5rem;
            border-radius: 0.5rem;
            border: none;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.7);
        }

        .btn-primary {
            background: var(--primary);
            color: white;
        }

        .btn:hover {
            opacity: 0.9;
        }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }
    </style>
</head>

<body class="has-back-button">
    <header id="layout-header"></header>

    <main id="layout-main">
        <div class="header-section">
            <h1>결제 추가</h1>
        </div>

        <div class="container">
            <div class="form-section">
                <div class="form-group">
                    <label>건물</label>
                    <select id="mp-building" onchange="loadRoomsForBuilding()">
                        <option value="">건물을 선택하세요</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>호수</label>
                    <select id="mp-room" onchange="onRoomSelected()" disabled>
                        <option value="">건물을 먼저 선택하세요</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>날짜</label>
                    <input type="date" id="mp-date">
                </div>
                <div class="form-group">
                    <label>금액 (원)</label>
                    <input type="number" id="mp-amount" placeholder="300000">
                </div>
                <div class="form-group">
                    <label>메모 (선택)</label>
                    <input type="text" id="mp-memo" placeholder="현금 수령 등">
                </div>

                <div class="warning-box">
                    ⚠ 이 납부가 기존 납부 사이에 삽입되면 이후 납부의 Invoice 배정이 자동 조정됩니다.
                </div>

                <div id="mp-result" class="result-box"></div>

                <div class="btn-group">
                    <button class="btn btn-secondary" onclick="window.location.href='payments.html'">취소</button>
                    <button class="btn btn-primary" id="mp-save-btn" onclick="saveManualPayment()">저장 및 배정</button>
                </div>
            </div>
        </div>
    </main>

    <footer id="layout-footer">
        <div class="footer-container" style="flex-wrap: wrap;">
            <div class="footer-biz-name" onclick="toggleFooterInfo()">상호명: 김지선, 김세미 부동산</div>
            <div class="footer-links">
                <a href="/terms.html" class="footer-btn" style="text-decoration: none;">이용약관</a>
                <a href="/privacy.html" class="footer-btn" style="text-decoration: none;">개인정보처리방침</a>
            </div>
            <div id="footer-biz-details" class="footer-info-details">
                상호명: 김지선, 김세미 부동산<br>
                대표자명: 김지선외 1명<br>
                사업자등록번호: 640-31-00762<br>
                주소: 경기도 수원시 팔달구 우만동 89-5 GS지에스타워 403호
            </div>
        </div>
    </footer>

    <script src="/js/common.js"></script>
    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        let mpContractId = null;

        document.addEventListener('DOMContentLoaded', async () => {
            if (!user) { window.location.href = '/index.html'; return; }
            if (user.role === 'tenant') { window.location.href = 'payments_monthly.html'; return; }

            renderNavbar();

            const navBack = document.querySelector('.nav-back-btn');
            if (navBack) {
                navBack.onclick = (e) => {
                    e.preventDefault();
                    window.location.href = 'payments.html';
                };
            }

            await initPage();
        });

        async function initPage() {
            document.getElementById('mp-date').value = new Date().toISOString().slice(0, 10);
            document.getElementById('mp-amount').value = '';
            document.getElementById('mp-memo').value = '';
            document.getElementById('mp-result').style.display = 'none';

            const select = document.getElementById('mp-building');
            select.innerHTML = '<option value="">건물을 선택하세요</option>';
            document.getElementById('mp-room').innerHTML = '<option value="">건물을 먼째 선택하세요</option>';
            document.getElementById('mp-room').disabled = true;

            try {
                const res = await fetch(`/api/buildings/for-user?user_id=${user.id}&role=${user.role}`);
                if (res.ok) {
                    const buildings = await res.json();
                    buildings.forEach(b => {
                        const opt = document.createElement('option');
                        opt.value = b.id;
                        opt.textContent = b.name;
                        select.appendChild(opt);
                    });
                }
            } catch (e) {
                console.error('Failed to load buildings', e);
            }
        }

        async function loadRoomsForBuilding() {
            const buildingId = document.getElementById('mp-building').value;
            const roomSelect = document.getElementById('mp-room');
            roomSelect.innerHTML = '<option value="">호수를 선택하세요</option>';
            mpContractId = null;

            if (!buildingId) {
                roomSelect.disabled = true;
                return;
            }

            roomSelect.disabled = false;
            try {
                const res = await fetch(`/api/buildings/${buildingId}/rooms`);
                if (res.ok) {
                    const rooms = await res.json();
                    rooms.forEach(r => {
                        const opt = document.createElement('option');
                        opt.value = r.contract_id || '';
                        opt.textContent = `${r.room_number}호${r.tenant_name ? ' (' + r.tenant_name + ')' : ''}`;
                        roomSelect.appendChild(opt);
                    });
                }
            } catch (e) {
                console.error('Failed to load rooms', e);
            }
        }

        function onRoomSelected() {
            mpContractId = document.getElementById('mp-room').value;
        }

        async function saveManualPayment() {
            const contractId = mpContractId || document.getElementById('mp-room').value;
            const paidAt = document.getElementById('mp-date').value;
            const amount = parseInt(document.getElementById('mp-amount').value);
            const memo = document.getElementById('mp-memo').value;

            if (!contractId) return alert('건물과 호수를 선택하세요.');
            if (!paidAt) return alert('날짜를 선택하세요.');
            if (!amount || amount <= 0) return alert('올바른 금액을 입력하세요.');

            const btn = document.getElementById('mp-save-btn');
            btn.textContent = '저장 중...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/payments/manual', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: user.id,
                        contract_id: parseInt(contractId),
                        paid_at: paidAt,
                        amount: amount,
                        memo: memo || '수동 추가'
                    })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || '저장 실패');

                const resultDiv = document.getElementById('mp-result');
                resultDiv.style.display = 'block';
                resultDiv.innerHTML = `
                    <div style="color:#10b981; font-weight:600;">✅ 저장 완료</div>
                    <div style="margin-top:0.5rem;">
                        Payment ID: ${data.payment_id}<br>
                        Invoice 재배정: ${data.reallocation?.reallocated ? '완료' : '없음'}<br>
                        배정 건수: ${data.reallocation?.allocation_count || 0}건
                    </div>
                `;

                btn.textContent = '저장 및 배정';
                btn.disabled = false;

                // Redirect back after 2 seconds
                setTimeout(() => {
                    window.location.href = 'payments.html';
                }, 2000);
            } catch (e) {
                alert('저장 오류: ' + e.message);
                btn.textContent = '저장 및 배정';
                btn.disabled = false;
            }
        }
    </script>
</body>

</html>
