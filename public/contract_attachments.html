<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>계약서 첨부 - Sugar</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 1.5rem;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 70px;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            height: 3.5rem;
            margin-bottom: 0.5rem;
        }

        .header h1 {
            font-size: 1.25rem;
            margin: 0;
            background: linear-gradient(to right, #6366f1, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 1rem 1.5rem;
        }

        .upload-area {
            border: 2px dashed rgba(255, 255, 255, 0.15);
            border-radius: 1rem;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 1.5rem;
        }

        .upload-area:hover {
            border-color: var(--primary);
            background: rgba(99, 102, 241, 0.05);
        }

        .upload-area p {
            margin: 0.5rem 0;
            opacity: 0.6;
            font-size: 0.9rem;
        }

        .upload-icon {
            font-size: 2rem;
            opacity: 0.5;
        }

        .image-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .image-card {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 0.8rem;
            overflow: hidden;
            position: relative;
        }

        .image-card img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            display: block;
        }

        .image-card .delete-btn {
            position: absolute;
            top: 0.5rem;
            right: 0.5rem;
            background: rgba(239, 68, 68, 0.8);
            color: white;
            border: none;
            border-radius: 50%;
            width: 1.8rem;
            height: 1.8rem;
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        .image-card .delete-btn:hover {
            background: rgba(239, 68, 68, 1);
        }

        .upload-status {
            display: none;
            padding: 1rem;
            background: rgba(99, 102, 241, 0.1);
            border-radius: 0.5rem;
            margin-bottom: 1rem;
            font-size: 0.85rem;
            color: #a5b4fc;
        }

        .btn-back {
            background: rgba(255, 255, 255, 0.05);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.8rem;
            padding: 0.6rem 1.2rem;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-back:hover {
            background: rgba(255, 255, 255, 0.12);
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            opacity: 0.4;
            font-size: 0.9rem;
        }
    </style>
</head>

<body class="has-back-button">
    <header id="layout-header"></header>

    <div class="header" id="sticky-header">
        <h1 id="page-title">계약서 첨부</h1>
        <button class="btn-back" onclick="goBack()">뒤로</button>
    </div>

    <div class="container">
        <div id="upload-status" class="upload-status"></div>

        <div class="upload-area" onclick="document.getElementById('file-input').click()">
            <div class="upload-icon">📎</div>
            <p>이미지를 선택하거나 여기에 드래그하세요</p>
            <p style="font-size: 0.75rem; opacity: 0.4;">최대 10장까지 업로드 가능 (자동 리사이즈)</p>
        </div>
        <input type="file" id="file-input" accept="image/*" multiple style="display:none" onchange="handleFileSelect(event)">

        <div id="image-grid" class="image-grid">
            <div class="empty-state">첨부된 이미지가 없습니다.</div>
        </div>
    </div>

    <script src="/js/common.js"></script>
    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        const urlParams = new URLSearchParams(window.location.search);
        const contractId = urlParams.get('contract_id');

        document.addEventListener('DOMContentLoaded', async () => {
            if (!user) { window.location.href = '/index.html'; return; }
            if (!contractId) { alert('계약 ID가 없습니다.'); window.location.href = 'contracts.html'; return; }

            renderNavbar();

            const navBack = document.querySelector('.nav-back-btn');
            if (navBack) {
                navBack.onclick = (e) => {
                    e.preventDefault();
                    goBack();
                };
            }

            await loadAttachments();
        });

        function goBack() {
            const referrer = document.referrer;
            if (referrer.includes('contract_new.html')) {
                window.location.href = `contract_new.html?contract_id=${contractId}`;
            } else {
                window.location.href = 'contracts.html';
            }
        }

        async function loadAttachments() {
            try {
                const res = await fetch(`/api/contracts/${contractId}/attachments`);
                if (!res.ok) return;
                const attachments = await res.json();
                renderAttachments(attachments);
            } catch (e) {
                console.error('Failed to load attachments', e);
            }
        }

        function renderAttachments(attachments) {
            const grid = document.getElementById('image-grid');
            if (!attachments || attachments.length === 0) {
                grid.innerHTML = '<div class="empty-state">첨부된 이미지가 없습니다.</div>';
                return;
            }

            grid.innerHTML = '';
            attachments.forEach(att => {
                const card = document.createElement('div');
                card.className = 'image-card';
                card.innerHTML = `
                    <img src="${att.image_url}" alt="계약서 이미지" onclick="window.open('${att.image_url}', '_blank')">
                    <button class="delete-btn" onclick="deleteAttachment(${att.id})" title="삭제">×</button>
                `;
                grid.appendChild(card);
            });
        }

        async function deleteAttachment(imageId) {
            if (!confirm('이 이미지를 삭제하시겠습니까?')) return;

            try {
                const res = await fetch(`/api/contracts/${contractId}/attachments/${imageId}`, {
                    method: 'DELETE'
                });
                if (res.ok) {
                    await loadAttachments();
                } else {
                    alert('삭제 실패');
                }
            } catch (e) {
                alert('오류: ' + e.message);
            }
        }

        async function handleFileSelect(event) {
            const files = Array.from(event.target.files);
            if (files.length === 0) return;

            const statusDiv = document.getElementById('upload-status');
            statusDiv.style.display = 'block';
            statusDiv.textContent = `${files.length}개 이미지 처리 중...`;

            // Resize and upload each image
            const formData = new FormData();
            let processed = 0;

            for (const file of files) {
                try {
                    const resizedBlob = await resizeImage(file, 1920, 1080, 0.8);
                    const resizedFile = new File([resizedBlob], file.name, { type: 'image/jpeg' });
                    formData.append('files', resizedFile);
                    processed++;
                    statusDiv.textContent = `${processed}/${files.length} 이미지 리사이즈 중...`;
                } catch (e) {
                    console.error('Resize failed for', file.name, e);
                    // Fallback: use original file
                    formData.append('files', file);
                }
            }

            statusDiv.textContent = '서버에 업로드 중...';

            try {
                const res = await fetch(`/api/contracts/${contractId}/attachments`, {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();

                if (res.ok) {
                    statusDiv.textContent = `✅ ${data.attachments.length}개 이미지 업로드 완료`;
                    setTimeout(() => { statusDiv.style.display = 'none'; }, 2000);
                    await loadAttachments();
                } else {
                    statusDiv.textContent = '❌ 업로드 실패: ' + (data.error || '알 수 없는 오류');
                }
            } catch (e) {
                statusDiv.textContent = '❌ 업로드 오류: ' + e.message;
            }

            // Reset input
            event.target.value = '';
        }

        /**
         * Resize image to fit within maxWidth x maxHeight while maintaining aspect ratio.
         * Output is JPEG with specified quality.
         */
        function resizeImage(file, maxWidth, maxHeight, quality) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        let { width, height } = img;

                        // Calculate new dimensions
                        if (width > maxWidth) {
                            height = Math.round((height * maxWidth) / width);
                            width = maxWidth;
                        }
                        if (height > maxHeight) {
                            width = Math.round((width * maxHeight) / height);
                            height = maxHeight;
                        }

                        const canvas = document.createElement('canvas');
                        canvas.width = width;
                        canvas.height = height;

                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        canvas.toBlob((blob) => {
                            if (blob) resolve(blob);
                            else reject(new Error('Canvas toBlob failed'));
                        }, 'image/jpeg', quality);
                    };
                    img.onerror = () => reject(new Error('Image load failed'));
                    img.src = e.target.result;
                };
                reader.onerror = () => reject(new Error('FileReader failed'));
                reader.readAsDataURL(file);
            });
        }
    </script>
</body>

</html>
