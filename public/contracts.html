<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contracts - Sugar</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .tenant-mgmt-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 1.5rem;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 70px;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            height: 3.5rem;
            width: 100%;
            box-sizing: border-box;
        }

        .tenant-mgmt-header h1 {
            font-size: 1.25rem !important;
            margin: 0;
            background: linear-gradient(to right, #6366f1, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            white-space: nowrap;
            margin-right: 1rem;
        }

        .container {
            max-width: none !important;
            padding: 0 !important;
            margin: 0 !important;
        }

        .tenant-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .tenant-summary {
            display: flex;
            align-items: center;
            padding: 0.8rem 1rem;
            gap: 1.2rem;
            min-height: 5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(255, 255, 255, 0.02);
            transition: background 0.2s;
        }

        .tenant-summary:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .room-badge {
            width: 4.5rem;
            padding: 0.4rem 0.2rem;
            background: rgba(99, 102, 241, 0.15);
            color: #a5b4fc;
            border-radius: 0.4rem;
            text-align: center;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1px;
            min-height: 3.2rem;
        }

        .room-badge .b-name {
            font-size: 0.65rem;
            opacity: 0.7;
            width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-weight: 400;
        }

        .room-badge .r-num {
            font-size: 0.9rem;
            font-weight: 700;
            width: 100%;
        }

        .tenant-center {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            height: 100%;
            min-width: 0;
        }

        .center-top {
            flex: 1;
            display: flex;
            align-items: flex-end;
            font-size: 1rem;
            font-weight: 400;
            padding-bottom: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #f8fafc;
        }

        .center-bottom {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            font-size: 0.65rem;
            color: rgba(255, 255, 255, 0.5);
            gap: 0px;
            padding-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .tenant-actions {
            display: flex;
            gap: 0.5rem;
            flex-shrink: 0;
            align-self: center;
        }

        .btn-del {
            background: rgba(239, 68, 68, 0.1);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.2);
            padding: 0.4rem 0.8rem;
            font-size: 0.8rem;
            font-weight: 600;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-del:hover {
            background: rgba(239, 68, 68, 0.2);
        }

        .list-controls {
            display: flex;
            justify-content: flex-end;
            gap: 0.5rem;
            margin-top: 0.8rem;
            margin-bottom: 1rem;
            padding: 0 0.5rem;
        }

        .control-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.7);
            padding: 0.4rem 0.8rem;
            border-radius: 0.5rem;
            font-size: 0.75rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .control-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }
    </style>
</head>

<body class="has-back-button">
    <div class="tenant-mgmt-header">
        <h1>계약 관리</h1>
        <div style="display: flex; gap: 0.5rem; align-items: center;">
            <button class="btn-glass" onclick="location.href='/contract_new.html'">계약 등록</button>
        </div>
    </div>

    <div class="container" id="main-content">
        <div class="list-controls">
            <button class="control-btn" onclick="toggleSort()">
                <span>정렬: </span>
                <span id="sort-text">건물 호수별</span>
            </button>
        </div>

        <div id="contracts-container">
            <!-- Content will be populated by JS -->
        </div>
    </div>

    <script src="/js/common.js"></script>
    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        let allContracts = [];
        let sortMethod = 'room'; // 'room' or 'date'

        document.addEventListener('DOMContentLoaded', async () => {
            if (!user) {
                window.location.href = '/index.html';
                return;
            }
            renderNavbar();
            await loadContracts();
        });

        async function loadContracts() {
            try {
                const res = await fetch(`/api/contracts/list?role=${user.role}&user_id=${user.id}`);
                if (!res.ok) throw new Error('Failed to fetch contracts');
                allContracts = await res.json();
                renderContracts();
            } catch (err) {
                console.error(err);
            }
        }

        function toggleSort() {
            sortMethod = sortMethod === 'room' ? 'date' : 'room';
            document.getElementById('sort-text').textContent = sortMethod === 'room' ? '건물 호수별' : '계약 시작일순';
            renderContracts();
        }

        function renderContracts() {
            const container = document.getElementById('contracts-container');
            if (!allContracts || allContracts.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:3rem; opacity:0.5;">데이터가 없습니다.</div>';
                return;
            }

            const sorted = [...allContracts].sort((a, b) => {
                if (sortMethod === 'date') {
                    return (a.contract_start_date || '').localeCompare(b.contract_start_date || '');
                } else {
                    const bCompare = (a.building || '').localeCompare(b.building || '');
                    if (bCompare !== 0) return bCompare;
                    return String(a.room_number || '').localeCompare(String(b.room_number || ''), undefined, { numeric: true });
                }
            });

            container.innerHTML = `
                <div class="tenant-list">
                    ${sorted.map(c => {
                const start = c.contract_start_date || '-';
                const end = c.contract_end_date || '-';
                const deposit = c.deposit ? Math.floor(c.deposit / 10000) : 0;
                const rent = c.rent ? Math.floor(c.rent / 10000) : 0;
                const mgmtFee = c.maintenance_fee ? Math.floor(c.maintenance_fee / 10000) : 0;

                return `
                            <div class="tenant-summary" onclick="location.href='/contract_new.html?action=view&contract_id=${c.contract_id}'" style="cursor:pointer;">
                                <div class="room-badge">
                                    <div class="b-name">${c.building || '미지정'}</div>
                                    <div class="r-num">${c.room_number || '-'}</div>
                                </div>
                                <div class="tenant-center">
                                    <div class="center-top">
                                        <span>${c.nickname || '이름 없음'}</span>
                                    </div>
                                    <div class="center-bottom">
                                        <div>${start} ~ ${end}</div>
                                        <div>${deposit.toLocaleString()} / ${rent.toLocaleString()} / ${mgmtFee.toLocaleString()}</div>
                                    </div>
                                </div>
                                <div class="tenant-actions" onclick="event.stopPropagation()">
                                    <button class="btn-del" onclick="deleteContract(${c.contract_id}, '${c.nickname || '이름 없음'}')">삭제</button>
                                </div>
                            </div>
                        `;
            }).join('')}
                </div>
            `;
        }

        async function deleteContract(id, name) {
            if (!confirm(`${name} 님의 계약 정보를 삭제하시겠습니까? 관련 납부 내역도 함께 삭제될 수 있습니다.`)) return;
            try {
                const res = await fetch(`/api/contracts/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    alert('삭제되었습니다.');
                    await loadContracts();
                } else {
                    const err = await res.json();
                    alert('오류: ' + (err.error || '삭제 실패'));
                }
            } catch (err) {
                alert('통신 오류');
            }
        }
    </script>
</body>

</html>
