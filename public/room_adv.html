<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>방 내놓기 - Sugar</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 1.5rem;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            height: 3.5rem;
        }

        .header h1 {
            font-size: 1.25rem;
            margin: 0;
            background: linear-gradient(to right, #6366f1, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            padding: 0;
            margin: 0;
            width: 100%;
        }

        .mgmt-list {
            display: flex;
            flex-direction: column;
            gap: 1px;
        }

        .mgmt-item {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(255, 255, 255, 0.02);
            transition: background 0.2s;
        }

        .mgmt-item:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .mgmt-summary {
            display: flex;
            align-items: center;
            padding: 0.8rem 1rem;
            gap: 0.6rem;
            min-height: 5rem;
        }

        .mgmt-left {
            width: 4.5rem;
            padding: 0.4rem 0.2rem;
            background: rgba(99, 102, 241, 0.15);
            color: #a5b4fc;
            border-radius: 0.4rem;
            text-align: center;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 1px;
            min-height: 3.2rem;
            justify-content: center;
        }

        .mgmt-left .b-name {
            font-size: 0.65rem;
            opacity: 0.7;
            width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .mgmt-left .r-num {
            font-size: 0.9rem;
            font-weight: 700;
        }

        .mgmt-center {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-width: 0;
        }

        .center-top {
            font-size: 1rem;
            color: #f8fafc;
            margin-bottom: 2px;
        }

        .center-bottom {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
        }

        .mgmt-right {
            display: flex;
            gap: 0.5rem;
            flex-shrink: 0;
        }

        .action-btn {
            height: 2rem;
            padding: 0 1rem;
            border-radius: 0.4rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.8rem;
            font-weight: 600;
            cursor: pointer;
            color: white;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: all 0.2s;
        }

        .btn-edit {
            background: rgba(99, 102, 241, 0.25);
            border-color: rgba(99, 102, 241, 0.3);
        }

        .btn-edit:hover {
            background: rgba(99, 102, 241, 0.4);
            border-color: rgba(99, 102, 241, 0.5);
        }

        .btn-done {
            background: rgba(34, 197, 94, 0.25);
            border-color: rgba(34, 197, 94, 0.3);
        }

        .btn-done:hover {
            background: rgba(34, 197, 94, 0.4);
            border-color: rgba(34, 197, 94, 0.5);
        }

        .btn-delete {
            background: rgba(239, 68, 68, 0.25);
            border-color: rgba(239, 68, 68, 0.3);
        }

        .btn-delete:hover {
            background: rgba(239, 68, 68, 0.4);
            border-color: rgba(239, 68, 68, 0.5);
        }

        .status-badge {
            height: 2rem;
            padding: 0 0.8rem;
            border-radius: 0.4rem;
            font-size: 0.75rem;
            font-weight: 600;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 3.5rem;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .status-advertising {
            background: rgba(34, 197, 94, 0.2);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .status-completed {
            background: rgba(148, 163, 184, 0.2);
            color: #94a3b8;
            border: 1px solid rgba(148, 163, 184, 0.3);
        }

        .status-drawing {
            background: rgba(99, 102, 241, 0.2);
            color: #818cf8;
            border: 1px solid rgba(99, 102, 241, 0.3);
        }

        .btn-add {
            padding: 0.5rem 1rem;
            background: var(--primary);
            border-radius: 0.5rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: white;
            text-decoration: none;
        }
    </style>
</head>

<body>
    <!-- Navbar -->
    <div class="header">
        <h1>방 내놓기</h1>
        <a href="room_new.html" class="btn-glass">추가</a>
    </div>

    <div class="container">
        <div id="adv-list" class="mgmt-list">
            <div style="text-align:center; opacity:0.5; padding:3rem;">로딩 중...</div>
        </div>
    </div>


    <script src="/js/common.js"></script>
    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        let cachedBuildings = []; // Cache for accessing memos
        let selectedFiles = [];

        document.addEventListener('DOMContentLoaded', () => {
            renderNavbar();
            fetchAdvRooms();
        });

        async function fetchAdvRooms() {
            try {
                const res = await fetch(`/api/postings?type=room&role=${user.role}&user_id=${user.id}`);
                const rooms = await res.json();
                renderRooms(rooms);
            } catch (err) {
                console.error(err);
            }
        }

        function formatVal(v) {
            if (!v) return '0';
            const val = v / 10000;
            return val.toLocaleString(undefined, { maximumFractionDigits: 1 });
        }

        function renderRooms(rooms) {
            const list = document.getElementById('adv-list');
            list.innerHTML = '';

            if (!Array.isArray(rooms) || rooms.length === 0) {
                list.innerHTML = '<div style="text-align:center; opacity:0.5; padding:3rem;">광고 중인 방이 없습니다.</div>';
                return;
            }

            rooms.forEach(room => {
                const item = document.createElement('div');
                item.className = 'mgmt-item';

                const deposit = formatVal(room.deposit);
                const rent = formatVal(room.rent);
                const mgmt = formatVal(room.management_fee);
                const available = room.available_date || '-';

                const statusMap = {
                    'advertising': { label: '광고중', class: 'status-advertising' },
                    'completed': { label: '완료', class: 'status-completed' },
                    'drawing': { label: '추첨중', class: 'status-drawing' }
                };
                const statusInfo = statusMap[room.status] || { label: room.status || '대기', class: '' };

                item.innerHTML = `
                    <div class="mgmt-summary" onclick="location.href='/room_new.html?id=${room.id}'">
                        <div class="mgmt-left">
                            <div class="b-name">${room.building || '미지정'}</div>
                            <div class="r-num">${room.room_number}</div>
                        </div>
                        <div class="mgmt-center">
                            <div class="center-top">${room.title || '제목 없음'}</div>
                            <div class="center-bottom">${deposit} / ${rent} / ${mgmt}<br>입실 가능: ${available}</div>
                        </div>
                        <div class="mgmt-right" style="align-items: center;">
                            <span class="status-badge ${statusInfo.class}">${statusInfo.label}</span>
                            <button class="action-btn btn-delete" onclick="deleteAdv(${room.id}); event.stopPropagation();">삭제</button>
                        </div>
                    </div>
                `;
                list.appendChild(item);
            });
        }

        async function deleteAdv(id) {
            if (!confirm('광고를 삭제하시겠습니까?')) return;
            try {
                const res = await fetch(`/api/postings/${id}`, { method: 'DELETE' });
                if (res.ok) {
                    alert('삭제되었습니다.');
                    fetchAdvRooms();
                } else {
                    const err = await res.json();
                    alert('삭제 실패: ' + err.error);
                }
            } catch (err) {
                console.error(err);
                alert('서버 통신 오류');
            }
        }



    </script>
</body>

</html>
