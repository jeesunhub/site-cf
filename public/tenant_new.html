<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>세입자 등록 - Sugar</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body.in-iframe {
            background: transparent;
            padding: 0;
        }

        .form-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 0;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .form-section {
            background: transparent;
            border: none;
            padding: 0;
            margin-bottom: 0.5rem;
        }

        .form-section h2 {
            font-size: 1rem;
            margin-bottom: 0.12rem;
            padding-bottom: 0.5rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            color: var(--primary);
            margin-top: 0;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 0.8rem;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.02rem;
        }

        .form-group label {
            font-size: 0.8rem;
            color: #94a3b8;
            font-weight: 400;
            opacity: 1;
            margin-bottom: 0.3rem;
        }

        .form-group input {
            background: #1e293b;
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 0.8rem;
            border-radius: 0.8rem;
            color: #f8fafc;
            font-size: 1rem;
            font-family: inherit;
        }

        .form-group input:focus {
            border-color: var(--primary);
            outline: none;
            background: rgba(255, 255, 255, 0.08);
        }

        .action-btns {
            display: flex;
            gap: 0.4rem;
            margin-top: 2rem;
            padding-bottom: 2rem;
        }

        .btn {
            flex: 1;
            height: 3.2rem;
            padding: 0 1rem;
            border-radius: 0.8rem;
            border: 1px solid rgba(255, 255, 255, 0.1);
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            line-height: 1;
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .btn-cancel {
            background: rgba(255, 255, 255, 0.05);
            color: white;
        }

        .btn-cancel:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.2);
        }

        .btn-submit {
            background: rgba(99, 102, 241, 0.3);
            color: white;
            border: 1px solid rgba(99, 102, 241, 0.4);
        }

        .btn-submit:hover {
            background: rgba(99, 102, 241, 0.45);
            border-color: rgba(99, 102, 241, 0.6);
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.2);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 1.5rem;
            background: rgba(15, 23, 42, 0.9);
            backdrop-filter: blur(10px);
            position: sticky;
            top: 70px;
            z-index: 100;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            height: 3.5rem;
            margin-bottom: 0.5rem;
        }

        .header h1 {
            font-size: 1.25rem;
            margin: 0;
            background: linear-gradient(to right, #6366f1, #a855f7);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container {
            margin: 0 !important;
            padding-top: 0.5rem;
        }

        .btn-inline {
            background: transparent;
            border: none;
            padding: 0;
            margin: 0;
            color: var(--accent);
            font-size: 0.85rem;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            transition: opacity 0.2s;
            opacity: 0.8;
            line-height: 1;
        }

        .btn-inline:hover {
            opacity: 1;
            color: var(--primary);
        }
    </style>
</head>

<body id="page-body" class="has-back-button">
    <!-- Navbar will be rendered by JS -->
    
    <div class="header" id="sticky-header">
        <h1 id="page-title">세입자 등록/수정</h1>
    </div>

    <div class="container" id="main-content">
        <form id="tenant-form" onsubmit="saveTenantInfo(event)">
            <input type="hidden" id="tenant-id" name="id">

            <div class="form-container">
                <div class="form-section">
                    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.05); margin-bottom: 0.12rem; padding-bottom: 0.5rem;">
                        <h2 style="border:none; margin:0; padding:0;">👤 세입자 정보</h2>
                    </div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>세입자 이름 <span style="color:#ef4444">*</span></label>
                            <input type="text" id="tenant-nickname" placeholder="세입자 이름을 입력하세요" required>
                        </div>
                        <div class="form-group">
                            <label>연락처</label>
                            <input type="tel" id="tenant-phone" placeholder="010-0000-0000" oninput="this.value = formatPhone(this.value)">
                        </div>
                        <div class="form-group">
                            <label>생년월일</label>
                            <input type="date" id="tenant-dob">
                        </div>
                    </div>
                </div>

                <div class="form-section">
                    <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255, 255, 255, 0.05); margin-bottom: 0.12rem; padding-bottom: 0.5rem;">
                        <h2 style="border:none; margin:0; padding:0;">🔑 키워드 정보</h2>
                    </div>
                    <div class="form-grid">
                        <div class="form-group">
                            <label>입금 인식 키워드 (쉼표로 구분)</label>
                            <input type="text" id="tenant-keywords" placeholder="예: 홍길동, 101호월세, 어머니이름">
                            <div style="font-size:0.75rem; color:rgba(255,255,255,0.4); margin-top:0.5rem;">
                                * 입력된 키워드는 이 세입자의 모든 활성 계약에 적용됩니다.
                            </div>
                        </div>
                    </div>
                </div>

                <div class="action-btns">
                    <button type="button" class="btn btn-cancel" onclick="history.back()">취소</button>
                    <button type="submit" class="btn btn-submit">저장하기</button>
                </div>
            </div>
        </form>
    </div>

    <script src="/js/common.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            renderNavbar(); // render navbar and back button based on .has-back-button

            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if (id) {
                document.getElementById('page-title').textContent = '세입자 정보 수정';
                document.getElementById('tenant-id').value = id;
                document.getElementById('tenant-nickname').value = params.get('nickname') || '';
                document.getElementById('tenant-phone').value = params.get('phone') || '';
                document.getElementById('tenant-dob').value = params.get('dob') || '';
                document.getElementById('tenant-keywords').value = params.get('keywords') || '';
            } else {
                document.getElementById('page-title').textContent = '세입자 추가';
            }
        });

        async function saveTenantInfo(e) {
            e.preventDefault();
            const btn = document.querySelector('.btn-submit');
            btn.disabled = true;
            btn.textContent = '저장 중...';

            const id = document.getElementById('tenant-id').value;
            const nickname = document.getElementById('tenant-nickname').value.trim();
            const phone = document.getElementById('tenant-phone').value.trim();
            const dob = document.getElementById('tenant-dob').value.trim();
            const keywordsRaw = document.getElementById('tenant-keywords').value.trim();
            
            const keywords = keywordsRaw ? keywordsRaw.split(',').map(k => k.trim()).filter(k => k) : [];

            try {
                const userPayload = {
                    id: id || undefined,
                    nickname: nickname,
                    phone_number: phone,
                    birth_date: dob,
                    role: 'tenant'
                };
                
                const res = await fetch('/api/users/quick', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(userPayload)
                });
                
                if (!res.ok) throw new Error('세입자 저장 실패');
                const result = await res.json();
                const targetUserId = result.userId;

                if (targetUserId) {
                    await fetch(`/api/tenants/${targetUserId}/keywords`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ keywords })
                    });
                }

                alert('저장되었습니다.');
                window.location.href = '/tenants.html';
            } catch (err) {
                alert(err.message);
                btn.disabled = false;
                btn.textContent = '저장하기';
            }
        }
    </script>
</body>
</html>
