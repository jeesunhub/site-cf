}

<body class="has-back-button">

        <div class="container">

    <script src="/js/common.js"></script>
    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        let activeContracts = [];
        let parsedRows = [];
        let existingPayments = [];

        document.addEventListener('DOMContentLoaded', async () => {
            if (!user) { window.location.href = '/index.html'; return; }
            if (user.role === 'tenant') { window.location.href = 'payments_monthly.html'; return; }

            renderNavbar();

            const navBack = document.querySelector('.nav-back-btn');
            if (navBack) {
                navBack.onclick = (e) => {
                    e.preventDefault();
                    window.location.href = 'payments.html';
                };
            }

            await loadActiveContracts();
        });

        async function loadActiveContracts() {
            try {
                let url;
                if (user.role === 'admin') {
                    // Admin: fetch all active contracts via admin calendar-data
                    url = `/api/admin/calendar-data`;
                    const res = await fetch(url);
                    if (res.ok) {
                        const rows = await res.json();
                        // Deduplicate by contract_id
                        const seen = new Set();
                        activeContracts = rows.filter(r => {
                            if (seen.has(r.contract_id)) return false;
                            seen.add(r.contract_id);
                            return true;
                        }).map(r => ({
                            id: r.contract_id,
                            tenant_id: r.tenant_id,
                            nickname: r.tenant_nickname,
                            building: r.building_name,
                            room_number: r.room_number,
                            keywords: [], // calendar-data doesn't include keywords
                            contract_start_date: r.contract_start_date,
                            contract_end_date: r.contract_end_date
                        }));
                    }
                } else {
                    // Landlord: fetch active contracts with keywords
                    url = `/api/landlord/${user.id}/contracts/active`;
                    const res = await fetch(url);
                    if (res.ok) {
                        const raw = await res.json();
                        const unique = [];
                        const seenIds = new Set();
                        raw.forEach(c => {
                            if (!seenIds.has(c.id)) {
                                seenIds.add(c.id);
                                unique.push(c);
                            }
                        });
                        activeContracts = unique;
                    }
                }
            } catch (e) {
                console.error('Failed to load active contracts', e);
            }
        }

        // ===== Logging =====

        function addLog(message, level = 'info') {
            const logArea = document.getElementById('log-area');
            if (!logArea) return;
            logArea.style.display = 'block';
            const line = document.createElement('div');
            line.className = `log-line log-${level}`;
            const now = new Date().toLocaleTimeString('ko-KR');
            line.textContent = `[${now}] ${message}`;
            logArea.appendChild(line);
            logArea.scrollTop = logArea.scrollHeight;
            console.log(`[PDF] ${message}`);
        }

        function clearLog() {
            const logArea = document.getElementById('log-area');
            if (logArea) {
                logArea.innerHTML = '';
                logArea.style.display = 'none';
            }
        }

        // ===== PDF Upload & Parse =====

        async function handlePdfUpload(event) {
            const file = event.target.files[0];
            if (!file) return;

            clearLog();
            showLoading(true);

            try {
                addLog(`파일명: ${file.name}, 크기: ${(file.size / 1024).toFixed(1)}KB`, 'info');

                // Step 1: Read file as ArrayBuffer
                addLog('파일 읽는 중...', 'debug');
                const arrayBuffer = await file.arrayBuffer();

                // Step 2: Validate PDF header
                const header = new TextDecoder().decode(arrayBuffer.slice(0, 5));
                if (header !== '%PDF-') {
                    addLog(`유효한 PDF가 아닙니다. 헤더: ${header}`, 'error');
                    addLog('DRM 보호 파일이거나 손상된 파일일 수 있습니다.', 'warn');
                    alert('유효한 PDF 파일이 아닙니다.');
                    showLoading(false);
                    return;
                }
                addLog('PDF 파일 검증 완료', 'success');

                // Step 3: Parse PDF with pdf.js
                addLog('PDF 문서 로드 중...', 'debug');
                const pdf = await pdfjsLib.getDocument({ data: arrayBuffer }).promise;
                addLog(`총 ${pdf.numPages}페이지`, 'info');

                let fullText = '';

                for (let i = 1; i <= pdf.numPages; i++) {
                    addLog(`페이지 ${i}/${pdf.numPages} 텍스트 추출 중...`, 'debug');
                    const page = await pdf.getPage(i);
                    const textContent = await page.getTextContent();
                    const items = textContent.items.filter(item => item.str.trim().length > 0);
                    if (items.length === 0) {
                        addLog(`페이지 ${i}: 텍스트 없음 (스캔 이미지일 수 있음)`, 'warn');
                        continue;
                    }
                    addLog(`페이지 ${i}: ${items.length}개 텍스트 항목`, 'debug');

                    let lastY = items[0].transform[5];
                    let currentLine = '';
                    for (const item of items) {
                        const y = item.transform[5];
                        if (Math.abs(y - lastY) > 2) {
                            fullText += currentLine.trim() + '\n';
                            currentLine = item.str;
                        } else {
                            currentLine += ' ' + item.str;
                        }
                        lastY = y;
                    }
                    if (currentLine.trim()) {
                        fullText += currentLine.trim() + '\n';
                    }
                }

                addLog(`총 텍스트 길이: ${fullText.length}자`, 'info');

                // Show first 200 chars for debugging
                if (fullText.length > 0) {
                    addLog(`텍스트 미리보기: ${fullText.substring(0, 200).replace(/\n/g, ' | ')}`, 'debug');
                }

                // Step 4: Parse text into rows
                addLog('텍스트 파싱 중...', 'debug');
                const rows = parsePdfText(fullText);
                addLog(`파싱 결과: ${rows.length}개 행 (입금 ${rows.filter(r => r.in > 0).length}건, 출금 ${rows.filter(r => r.out > 0).length}건)`, 'info');

                if (rows.length === 0) {
                    addLog('거래 내역을 찾을 수 없습니다.', 'error');
                    addLog('PDF 형식이 지원되지 않을 수 있습니다.', 'warn');
                    alert('PDF에서 거래 내역을 찾을 수 없습니다.');
                    showLoading(false);
                    return;
                }

                // Only keep deposit rows (in > 0)
                parsedRows = rows.filter(r => r.in > 0);
                addLog(`입금 내역만 필터링: ${parsedRows.length}건`, 'info');

                if (parsedRows.length === 0) {
                    addLog('입금 내역이 없습니다.', 'warn');
                    alert('입금 내역이 없습니다.');
                    showLoading(false);
                    return;
                }

                // Step 5: Check existing payments
                addLog(`활성 계약 수: ${activeContracts.length}건`, 'info');
                addLog('기존 납부 내역 확인 중...', 'debug');
                await checkExistingPayments();
                addLog(`기존 납부 내역: ${existingPayments.length}건`, 'info');

                // Step 6: Render list
                addLog('리스트 렌더링 중...', 'debug');
                renderList();

                document.getElementById('upload-area').style.display = 'none';
                document.getElementById('list-area').style.display = 'block';

                addLog('PDF 파싱 완료!', 'success');

            } catch (err) {
                addLog(`오류 발생: ${err.message}`, 'error');
                addLog(`스택: ${err.stack || 'N/A'}`, 'error');
                console.error('PDF 파싱 오류:', err);
                alert('PDF 파일을 읽는 중 오류가 발생했습니다: ' + err.message);
            } finally {
                showLoading(false);
                event.target.value = ''; // Reset for re-upload
            }
        }

        // ===== parsePdfText (from test/import-pdf/test_pdf_parse.js) =====

        function parsePdfText(text) {
            const isSpacedOut = /[가-힣]\s[가-힣]\s[가-힣]/.test(text) || /\d\s\.\s\d/.test(text);
            if (isSpacedOut) {
                const amountPlaceholders = [];
                text = text.replace(/((?:\d\s{0,1}){1,3}(?:,\s*(?:\d\s{0,1}){1,3})+\s*원)/g, (m) => {
                    const placeholder = `__AMT${amountPlaceholders.length}__`;
                    amountPlaceholders.push(m.replace(/\s+/g, ''));
                    return placeholder;
                });
                text = text.replace(/((?:\d\s{0,1}){1,3}\s*원)/g, (m) => {
                    if (m.includes('__AMT')) return m;
                    const placeholder = `__AMT${amountPlaceholders.length}__`;
                    amountPlaceholders.push(m.replace(/\s+/g, ''));
                    return placeholder;
                });

                text = text.replace(/(?<=[가-힣])\s+(?=[가-힣])/g, '');
                text = text.replace(/(?<=[A-Za-z])\s+(?=[A-Za-z])/g, '');
                text = text.replace(/(\d\s*)+\.\s*(\d\s*)+\.\s*(\d\s*)+/g, (m) => m.replace(/\s+/g, ''));
                text = text.replace(/(\d\s*)+:\s*(\d\s*)+(:\s*(\d\s*)+)*/g, (m) => m.replace(/\s+/g, ''));

                amountPlaceholders.forEach((val, idx) => {
                    text = text.replace(`__AMT${idx}__`, val);
                });

                text = text.replace(/ {2,}/g, ' ');
            }

            const rows = [];
            const lines = text.split('\n').map(l => l.trim()).filter(l => l.length > 0);

            const dateRegex = /(\d{4}[\.-]\d{2}[\.-]\d{2})/;
            const amountRegex = /([\d,]+)/g;
            const timeRegex = /(\d{2}:\d{2}(?::\d{2})?)/;

            let currentDate = null;
            let currentTime = null;

            for (const line of lines) {
                if (line.includes('거래일자') || line.includes('거래내역') || line.includes('적요') ||
                    line.includes('입금액') || line.includes('출금액') || line.includes('잔액') ||
                    line.includes('내역') || line.includes('구분') || line.includes('번호')) {
                    continue;
                }

                const dateMatch = line.match(dateRegex);
                if (dateMatch) {
                    currentDate = dateMatch[1].replace(/\./g, '-');
                }

                const timeMatch = line.match(timeRegex);
                if (timeMatch) {
                    currentTime = timeMatch[1];
                }

                if (!currentDate) continue;

                const lineWithoutDateTime = line
                    .replace(dateRegex, ' ')
                    .replace(timeRegex, ' ');

                const amounts = [];
                const wonAmountRegex = /([\d,]+)\s*원/g;
                let match;
                while ((match = wonAmountRegex.exec(lineWithoutDateTime)) !== null) {
                    amounts.push(parseInt(match[1].replace(/,/g, '')) || 0);
                }

                if (amounts.length < 2) {
                    const tempRegex = new RegExp(amountRegex.source, 'g');
                    while ((match = tempRegex.exec(lineWithoutDateTime)) !== null) {
                        amounts.push(parseInt(match[1].replace(/,/g, '')) || 0);
                    }
                }

                if (amounts.length < 2) continue;

                let depositAmount = 0;
                let withdrawalAmount = 0;
                let memo = '';

                const lowerLine = line.toLowerCase();

                if (lowerLine.includes('입금') || lowerLine.includes('deposit')) {
                    const depositIdx = line.indexOf('입금') !== -1 ? line.indexOf('입금') : line.toLowerCase().indexOf('deposit');
                    const afterDeposit = line.substring(depositIdx);
                    const depositWonAmounts = [];
                    let dMatch;
                    const dWonRegex = /([\d,]+)\s*원/g;
                    while ((dMatch = dWonRegex.exec(afterDeposit)) !== null) {
                        depositWonAmounts.push(parseInt(dMatch[1].replace(/,/g, '')) || 0);
                    }
                    if (depositWonAmounts.length > 0) {
                        depositAmount = depositWonAmounts[0];
                    } else {
                        const dRegex = new RegExp(amountRegex.source, 'g');
                        while ((dMatch = dRegex.exec(afterDeposit)) !== null) {
                            depositWonAmounts.push(parseInt(dMatch[1].replace(/,/g, '')) || 0);
                        }
                        depositAmount = depositWonAmounts.length > 0 ? depositWonAmounts[0] : 0;
                    }
                }

                if (lowerLine.includes('출금') || lowerLine.includes('withdraw')) {
                    const withdrawIdx = line.indexOf('출금') !== -1 ? line.indexOf('출금') : line.toLowerCase().indexOf('withdraw');
                    const afterWithdraw = line.substring(withdrawIdx);
                    const withdrawWonAmounts = [];
                    let wMatch;
                    const wWonRegex = /([\d,]+)\s*원/g;
                    while ((wMatch = wWonRegex.exec(afterWithdraw)) !== null) {
                        withdrawWonAmounts.push(parseInt(wMatch[1].replace(/,/g, '')) || 0);
                    }
                    if (withdrawWonAmounts.length > 0) {
                        withdrawalAmount = withdrawWonAmounts[0];
                    } else {
                        const wRegex = new RegExp(amountRegex.source, 'g');
                        while ((wMatch = wRegex.exec(afterWithdraw)) !== null) {
                            withdrawWonAmounts.push(parseInt(wMatch[1].replace(/,/g, '')) || 0);
                        }
                        withdrawalAmount = withdrawWonAmounts.length > 0 ? withdrawWonAmounts[0] : 0;
                    }
                }

                if (depositAmount === 0 && withdrawalAmount === 0 && amounts.length >= 2) {
                    if (amounts.length >= 3) {
                        if (amounts[0] === 0 && amounts[1] > 0) {
                            withdrawalAmount = 0;
                            depositAmount = amounts[1];
                        } else if (amounts[0] > 0 && amounts[1] === 0) {
                            withdrawalAmount = amounts[0];
                            depositAmount = 0;
                        } else {
                            withdrawalAmount = amounts[0];
                            depositAmount = amounts[1];
                        }
                    } else if (amounts[0] > 0 && amounts[1] === 0) {
                        depositAmount = amounts[0];
                        withdrawalAmount = 0;
                    } else if (amounts[0] === 0 && amounts[1] > 0) {
                        depositAmount = 0;
                        withdrawalAmount = amounts[1];
                    } else if (amounts[0] > 0 && amounts[1] > 0) {
                        depositAmount = amounts[0];
                        withdrawalAmount = amounts[1];
                    }
                }

                memo = line
                    .replace(dateRegex, '')
                    .replace(timeRegex, '')
                    .replace(/[\d,]+/g, '')
                    .replace(/입금|출금|원/g, '')
                    .trim()
                    .substring(0, 100);

                if (depositAmount > 0 || withdrawalAmount > 0) {
                    rows.push({
                        date: currentDate,
                        time: currentTime || '',
                        memo: memo,
                        in: depositAmount,
                        out: withdrawalAmount
                    });
                }
            }

            return rows;
        }

        // ===== Keyword Matching =====

        function matchTenant(memo) {
            if (!memo) return { contract: null, score: 0, matchedKeywords: [] };

            const results = activeContracts.map(c => {
                let score = 0;
                const matchedKeywords = [];

                // Check contract keywords
                if (c.keywords && Array.isArray(c.keywords)) {
                    c.keywords.forEach(k => {
                        if (k && k.length > 0 && memo.includes(k)) {
                            score += 100;
                            matchedKeywords.push(k);
                        }
                    });
                }

                // Check nickname
                if (c.nickname && c.nickname.length > 0 && memo.includes(c.nickname)) {
                    score += 50;
                    if (!matchedKeywords.includes(c.nickname)) {
                        matchedKeywords.push(c.nickname);
                    }
                }

                // Check room number (only if length >= 2 to avoid false positives)
                if (c.room_number && String(c.room_number).length >= 2 && memo.includes(String(c.room_number))) {
                    score += 30;
                    if (!matchedKeywords.includes(String(c.room_number))) {
                        matchedKeywords.push(String(c.room_number));
                    }
                }

                return { contract: c, score, matchedKeywords };
            });

            results.sort((a, b) => b.score - a.score);
            return results[0];
        }

        // ===== Check Existing Payments =====

        async function checkExistingPayments() {
            const contractIds = [...new Set(activeContracts.map(c => c.id))];
            if (contractIds.length === 0) return;

            try {
                const res = await fetch('/api/payments/check-existing', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contract_ids: contractIds })
                });
                if (res.ok) {
                    existingPayments = await res.json();
                }
            } catch (e) {
                console.error('Failed to check existing payments', e);
                existingPayments = [];
            }
        }

        function isAlreadyRegistered(row, contractId) {
            if (!contractId) return false;
            return existingPayments.some(p =>
                p.contract_id === contractId &&
                p.amount === row.in &&
                p.paid_date === row.date
            );
        }

        // ===== Render List =====

        function renderList() {
            const listEl = document.getElementById('parsed-list');
            listEl.innerHTML = '';

            let checkedCount = 0;
            let registeredCount = 0;

            parsedRows.forEach((row, idx) => {
                const match = matchTenant(row.memo);
                const contractId = match.contract ? match.contract.id : null;
                const isRegistered = isAlreadyRegistered(row, contractId);
                const isHighMatch = match.score >= 100;

                if (isRegistered) registeredCount++;
                if (isRegistered || isHighMatch) checkedCount++;

                const item = document.createElement('div');
                item.className = 'parsed-item';
                if (isRegistered) item.classList.add('registered');

                // Checkbox
                const checkboxChecked = isRegistered || isHighMatch ? 'checked' : '';
                const checkboxDisabled = isRegistered ? 'disabled' : '';

                // Match info
                let matchHtml = '';
                if (match.contract) {
                    const scoreClass = match.score >= 100 ? 'high' : (match.score > 0 ? 'low' : 'none');
                    matchHtml = `
                        <span class="tenant-name">${match.contract.nickname}</span>
                        <span class="match-score ${scoreClass}">${match.score}점</span>
                        <span style="font-size:0.75rem; opacity:0.4;">${match.contract.building || ''} ${match.contract.room_number || ''}호</span>
                    `;
                } else {
                    matchHtml = `<span class="tenant-name" style="opacity:0.4;">매칭 없음</span>`;
                }

                // Registered badge
                let badgeHtml = '';
                if (isRegistered) {
                    badgeHtml = '<span class="badge-registered">이미 등록</span>';
                }

                // Keywords
                const allKeywords = match.matchedKeywords || [];
                const keywordsHtml = allKeywords.length > 0
                    ? allKeywords.map(k => `<span class="keyword-chip matched">${k}</span>`).join('')
                    : '<span style="opacity:0.3;">매칭된 키워드 없음</span>';

                // Apply button
                const applyDisabled = isRegistered ? 'disabled' : '';

                item.innerHTML = `
                    <div class="item-checkbox">
                        <input type="checkbox" id="cb-${idx}" ${checkboxChecked} ${checkboxDisabled}
                            onchange="onCheckboxChange(${idx})">
                    </div>
                    <div class="item-center">
                        <div class="center-top-row">
                            ${matchHtml}
                            ${badgeHtml}
                            <span class="center-amount">${row.in.toLocaleString()}원</span>
                            <span class="center-date">${row.date} ${row.time || ''}</span>
                        </div>
                        <div class="center-keywords">
                            <span style="opacity:0.5;">키워드:</span>
                            ${keywordsHtml}
                        </div>
                    </div>
                    <div class="item-right">
                        <button class="btn-apply" id="apply-${idx}" ${applyDisabled}
                            onclick="applySingle(${idx})">적용</button>
                    </div>
                `;

                listEl.appendChild(item);
            });

            // Update summary
            document.getElementById('list-summary').textContent =
                `총 ${parsedRows.length}건 | 체크 ${checkedCount}건 | 이미 등록 ${registeredCount}건`;
        }

        function onCheckboxChange(idx) {
            // Just update summary
            let checkedCount = 0;
            let registeredCount = 0;
            parsedRows.forEach((row, i) => {
                const cb = document.getElementById(`cb-${i}`);
                if (!cb) return;
                const match = matchTenant(row.memo);
                const contractId = match.contract ? match.contract.id : null;
                const isRegistered = isAlreadyRegistered(row, contractId);
                if (isRegistered) registeredCount++;
                if (cb.checked) checkedCount++;
            });
            document.getElementById('list-summary').textContent =
                `총 ${parsedRows.length}건 | 체크 ${checkedCount}건 | 이미 등록 ${registeredCount}건`;
        }

        // ===== Apply Payments =====

        async function applySingle(idx) {
            const row = parsedRows[idx];
            const match = matchTenant(row.memo);
            if (!match.contract) {
                alert('매칭된 세입자가 없습니다.');
                return;
            }

            const contractId = match.contract.id;
            const paidAt = row.date + 'T' + (row.time || '12:00:00');

            const btn = document.getElementById(`apply-${idx}`);
            btn.textContent = '적용 중...';
            btn.disabled = true;

            try {
                const res = await fetch('/api/payments/manual', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        user_id: user.id,
                        contract_id: contractId,
                        paid_at: paidAt,
                        amount: row.in,
                        memo: row.memo || 'PDF 가져오기'
                    })
                });
                const data = await res.json();
                if (!res.ok) throw new Error(data.error || '적용 실패');

                // Mark as applied
                const item = btn.closest('.parsed-item');
                item.classList.add('applied');
                item.querySelector('.item-checkbox input').checked = true;
                item.querySelector('.item-checkbox input').disabled = true;
                btn.textContent = '적용 완료';
                btn.disabled = true;

                // Add to existingPayments to prevent re-application
                existingPayments.push({
                    contract_id: contractId,
                    amount: row.in,
                    paid_date: row.date
                });

                onCheckboxChange(idx);
            } catch (e) {
                alert('적용 오류: ' + e.message);
                btn.textContent = '적용';
                btn.disabled = false;
            }
        }

        async function applyAll() {
            const btn = document.getElementById('btn-apply-all');
            btn.textContent = '적용 중...';
            btn.disabled = true;

            const toApply = [];
            parsedRows.forEach((row, idx) => {
                const cb = document.getElementById(`cb-${idx}`);
                if (!cb || !cb.checked || cb.disabled) return;

                const match = matchTenant(row.memo);
                if (!match.contract) return;

                const contractId = match.contract.id;
                if (isAlreadyRegistered(row, contractId)) return;

                toApply.push({ idx, row, contractId });
            });

            if (toApply.length === 0) {
                alert('적용할 항목이 없습니다.');
                btn.textContent = '전체 적용';
                btn.disabled = false;
                return;
            }

            const progressBar = document.getElementById('progress-bar');
            progressBar.style.display = 'block';
            progressBar.style.width = '0%';

            let success = 0;
            let fail = 0;

            for (let i = 0; i < toApply.length; i++) {
                const { idx, row, contractId } = toApply[i];
                const paidAt = row.date + 'T' + (row.time || '12:00:00');

                try {
                    const res = await fetch('/api/payments/manual', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            user_id: user.id,
                            contract_id: contractId,
                            paid_at: paidAt,
                            amount: row.in,
                            memo: row.memo || 'PDF 가져오기'
                        })
                    });
                    const data = await res.json();
                    if (!res.ok) throw new Error(data.error || '적용 실패');

                    // Mark as applied
                    const item = document.getElementById(`apply-${idx}`).closest('.parsed-item');
                    item.classList.add('applied');
                    item.querySelector('.item-checkbox input').checked = true;
                    item.querySelector('.item-checkbox input').disabled = true;
                    const applyBtn = document.getElementById(`apply-${idx}`);
                    applyBtn.textContent = '적용 완료';
                    applyBtn.disabled = true;

                    existingPayments.push({
                        contract_id: contractId,
                        amount: row.in,
                        paid_date: row.date
                    });

                    success++;
                } catch (e) {
                    console.error(`Apply failed for row ${idx}:`, e);
                    fail++;
                }

                progressBar.style.width = `${((i + 1) / toApply.length) * 100}%`;
            }

            setTimeout(() => { progressBar.style.display = 'none'; }, 500);

            btn.textContent = '전체 적용';
            btn.disabled = false;

            onCheckboxChange(0);

            alert(`적용 완료: 성공 ${success}건${fail > 0 ? `, 실패 ${fail}건` : ''}`);
        }

        // ===== Helpers =====

        function showLoading(show) {
            document.getElementById('loading-overlay').style.display = show ? 'flex' : 'none';
        }
    </script>
