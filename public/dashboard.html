<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Sugar</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        body {
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .navbar {
            flex-shrink: 0;
        }

        .timeline-container {
            flex-shrink: 0;
            background: var(--bg);
            width: 100%;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            height: 420px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
        }
        .timeline-header {
            padding: 0.8rem 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 23, 42, 0.95);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .timeline-scroll-area {
            flex: 1;
            overflow: auto;
            position: relative;
        }
        /* 항상 보이도록 커스텀 스크롤바 추가 */
        .timeline-scroll-area::-webkit-scrollbar {
            height: 10px;
            width: 10px;
        }
        .timeline-scroll-area::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.5); 
        }
        .timeline-scroll-area::-webkit-scrollbar-thumb {
            background: rgba(99, 102, 241, 0.5); 
            border-radius: 5px;
        }
        .timeline-scroll-area::-webkit-scrollbar-thumb:hover {
            background: rgba(99, 102, 241, 0.8); 
        }
        .timeline-table {
            border-collapse: separate;
            border-spacing: 0;
            width: 100%;
            min-width: 800px;
        }
        .timeline-table th, .timeline-table td {
            border-right: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding: 8px;
            text-align: center;
            font-size: 0.85rem;
            white-space: nowrap;
        }
        .timeline-table th {
            background: #0f172a;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .col-sticky {
            position: sticky;
            left: 0;
            background: #1e293b;
            z-index: 11;
            text-align: left !important;
            min-width: 130px;
            max-width: 150px;
            box-shadow: 2px 0 5px rgba(0,0,0,0.2);
        }
        .timeline-table th.col-sticky {
            z-index: 12;
            background: #0f172a;
        }
        .room-group-row td {
            background: rgba(99, 102, 241, 0.1) !important;
            font-weight: 600;
            color: #a5b4fc;
            text-align: left;
            padding: 6px 12px;
            font-size: 0.85rem;
            position: sticky;
            left: 0;
            z-index: 5;
        }
        .tenant-row td {
            cursor: pointer;
            transition: background 0.2s;
        }
        .tenant-row:hover td {
            background: rgba(255, 255, 255, 0.02);
        }
        .tenant-row td.col-sticky:hover {
            background: #2a374a;
        }
        .badge {
            display: inline-block;
            padding: 4px 6px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge-green { background: rgba(16, 185, 129, 0.2); color: #10b981; }
        .badge-yellow { background: rgba(245, 158, 11, 0.2); color: #f59e0b; }
        .badge-red { background: rgba(239, 68, 68, 0.2); color: #ef4444; }
        .badge-gray {
            background-image: repeating-linear-gradient(45deg, transparent, transparent 5px, rgba(255,255,255,0.03) 5px, rgba(255,255,255,0.03) 10px);
            color: rgba(255, 255, 255, 0.2);
        }
        .timeline-table th.current-month {
            background: rgba(99, 102, 241, 0.2);
            color: #a5b4fc;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .timeline-table td.current-month-cell {
            background: rgba(99, 102, 241, 0.05);
        }
        .tenant-name-small {
            font-size: 0.85rem;
            color: #f1f5f9;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .tenant-period-small {
            font-size: 0.65rem;
            color: rgba(255,255,255,0.5);
            display: block;
            margin-top: 2px;
        }

        .container {
            padding: 0;
            margin: 0;
            width: 100%;
        }

        #layout-main {
            display: flex;
            flex-direction: column;
            overflow: hidden !important;
            flex: 1;
            min-height: 0;
            height: 100%;
            /* Force height */
        }

        #main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden !important;
            margin: 0 !important;
            padding: 0 !important;
            width: 100% !important;
            max-width: none !important;
            min-height: 0;
        }

        .list-container {
            flex: 1;
            width: 100%;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
        }

        .list-section-header {
            position: sticky;
            top: 0;
            z-index: 10;
            padding: 1rem 1.2rem;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.05rem;
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            margin-top: 0;
        }

        .item-list {
            list-style: none;
            padding: 0;
            margin: 0;
            background: var(--bg);
            flex: 1;
            overflow-y: auto;
        }

        .toggle-container {
            display: flex;
            background: rgba(15, 23, 42, 0.95);
            padding: 0.8rem 1.2rem;
            gap: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            top: 0;
            z-index: 20;
        }

        .toggle-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.5);
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            padding: 0.5rem 0;
            position: relative;
            transition: color 0.2s;
        }

        .toggle-btn.active {
            color: var(--primary);
        }

        .toggle-btn.active::after {
            content: '';
            position: absolute;
            bottom: -0.8rem;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--primary);
            box-shadow: 0 0 10px var(--primary);
        }

        .list-scroll-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            min-height: 0;
            overflow: hidden;
            position: relative;
        }

        .item-list {
            list-style: none;
            padding: 0;
            margin: 0;
            background: var(--bg);
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
            display: flex;
            flex-direction: column;
        }

        .item-row {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(255, 255, 255, 0.02);
            transition: background 0.2s;
            cursor: pointer;
        }

        .item-row:hover {
            background: rgba(255, 255, 255, 0.05);
        }

        .item-summary {
            display: flex;
            align-items: center;
            padding: 0.8rem 1rem;
            gap: 1.2rem;
            min-height: 5rem;
        }

        /* Room Badge Style from tenants.html */
        .room-badge {
            width: 4.5rem;
            padding: 0.4rem 0.2rem;
            background: rgba(99, 102, 241, 0.15);
            color: #a5b4fc;
            border-radius: 0.4rem;
            text-align: center;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 1px;
            min-height: 3.2rem;
        }

        .room-badge .b-name {
            font-size: 0.65rem;
            opacity: 0.7;
            width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-weight: 400;
        }

        .room-badge .r-num {
            font-size: 0.9rem;
            font-weight: 700;
            width: 100%;
        }

        .item-content-group {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-width: 0;
        }

        .item-title-row {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            margin-bottom: 2px;
        }

        .item-title {
            font-size: 1rem;
            font-weight: 600;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            color: #f1f5f9;
        }

        .item-status {
            font-size: 0.65rem;
            padding: 1px 6px;
            border-radius: 4px;
            font-weight: 600;
            white-space: nowrap;
        }

        .item-status.unpaid {
            background: rgba(239, 68, 68, 0.2);
            color: #fca5a5;
        }

        .item-status.paid {
            background: rgba(34, 197, 94, 0.2);
            color: #a7f3d0;
        }

        .item-meta {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.5);
            display: flex;
            flex-direction: column;
        }

        .item-amount {
            font-weight: 600;
            font-size: 1rem;
            flex-shrink: 0;
            text-align: right;
            margin-left: auto;
            color: #f1f5f9;
        }

        .amount-detail {
            font-size: 0.7rem;
            opacity: 0.5;
            font-weight: 400;
        }

        .empty-state {
            opacity: 0.4;
            padding: 3rem 1rem;
            text-align: center;
            font-size: 0.9rem;
        }

        /* Day Detail Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.3);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 2000;
            backdrop-filter: blur(4px);
        }

        .modal-content {
            background: #1e293b;
            padding: 1.5rem;
            border-radius: 1.5rem;
            width: 90%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .modal-header h3 {
            margin: 0;
            font-size: 1.25rem;
            background: linear-gradient(to right, #6366f1, #a855f7);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .close-modal {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
            transition: all 0.2s;
        }

        .close-modal:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: rotate(90deg);
        }

        .event-list {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .event-detail-item {
            background: rgba(255, 255, 255, 0.03);
            border-left: 4px solid var(--primary);
            padding: 1rem;
            border-radius: 0.5rem;
        }

        .event-detail-title {
            font-weight: 600;
            font-size: 1rem;
            margin-bottom: 0.25rem;
            color: #f1f5f9;
        }

        .event-detail-meta {
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>

<body>
    <!-- Navbar will be rendered by JS -->

    <!-- Separate Sticky Calendar Section -->
    <div id="sticky-calendar-anchor"></div>

    <div class="container" id="main-content">
        <!-- Open Banking Sync Status Card -->
        <div id="sync-status-card" style="display:none; margin-bottom:16px; padding:16px; background:rgba(99,102,241,0.1); border:1px solid rgba(99,102,241,0.3); border-radius:12px;">
            <div style="display:flex; align-items:center; gap:8px; margin-bottom:8px;">
                <span style="font-size:20px;">📊</span>
                <strong id="sync-title">계좌 동기화 완료</strong>
            </div>
            <div style="display:flex; gap:16px; flex-wrap:wrap; margin-bottom:8px;">
                <span id="sync-new">신규 입금: 0건</span>
                <span id="sync-matched" style="color:#10b981;">자동 매칭 완료: 0건 ✅</span>
                <span id="sync-unconfirmed" style="color:#f59e0b;">확인 필요: 0건 ⚠️</span>
            </div>
            <button onclick="location.href='payments.html'" style="padding:6px 16px; background:var(--accent); color:#fff; border:none; border-radius:8px; cursor:pointer;">확인하러 가기</button>
        </div>
        <!-- Dashboard content (sidebar/stats) will be rendered here -->
    </div>

    <!-- Context Menu for Payment Date Adjustment -->
    <div id="context-menu" class="context-menu">
    </div>

    <!-- Day Detail Modal -->
    <div id="day-detail-modal" class="modal-overlay" onclick="if(event.target === this) closeDayModal()">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="modal-date-title">2026년 2월 14일</h3>
                <button class="close-modal" onclick="closeDayModal()">×</button>
            </div>
            <div id="modal-event-list" class="event-list">
                <!-- Events will be rendered here -->
            </div>
        </div>
    </div>

    <script src="/js/common.js"></script>
    <script>
        const user = JSON.parse(localStorage.getItem('user'));
        let currentView = 'landlord'; // 'landlord' or 'tenant'
        let currentMonth = new Date();
        let selectedBillId = null;
        let calendarData = [];
        let billingData = [];
        let holidayCache = {}; // { year: { "YYYY-MM-DD": name } }

        document.addEventListener('DOMContentLoaded', () => {
            if (!user) {
                window.location.href = '/index.html';
                return;
            }
            renderNavbar();
            init();
        });

        async function init() {
            // Load Open Banking sync status
            loadSyncStatus();
            
            if (user.role === 'landlord' || user.role === 'admin') {
                await loadLandlordView();
            } else {
                await loadTenantView(user.id);
            }
        }

        async function loadSyncStatus() {
            try {
                const res = await fetch(`/api/openbank/sync/status?user_id=${user.id}`);
                if (!res.ok) return;
                const data = await res.json();
                if (data.unprocessed_count > 0) {
                    const card = document.getElementById('sync-status-card');
                    if (card) {
                        card.style.display = 'block';
                        document.getElementById('sync-new').textContent = `미확인 입금: ${data.unprocessed_count}건`;
                        document.getElementById('sync-unconfirmed').textContent = `확인 필요: ${data.unprocessed_count}건 ⚠️`;
                        document.getElementById('sync-matched').textContent = '';
                    }
                }
            } catch(e) {
                // Sync status is optional, don't break dashboard
            }
        }

        async function loadLandlordView() {
            currentView = 'landlord';
            const isAdmin = user.role === 'admin';

            try {
            // 1. Fetch Tenants
            const tenantsUrl = isAdmin ? '/api/admin/tenants' : `/api/landlord/${user.id}/tenants`;
            const res = await fetch(tenantsUrl);
            if (!res.ok) throw new Error(`Tenants API 오류: ${res.status}`);
            const tenants = await res.json();

            // 2. Fetch Calendar Data
            const calUrl = isAdmin ? '/api/admin/calendar-data' : `/api/landlord/${user.id}/calendar-data`;
            const calRes = await fetch(calUrl);
            if (!calRes.ok) {
                console.error('Calendar API 오류:', calRes.status);
                calendarData = [];
            } else {
                calendarData = await calRes.json();
            }

            // 3. Process Billing Data (Unpaid & Transactions)
            const allBills = [];
            for (const t of tenants) {
                try {
                    const billRes = await fetch(`/api/tenant/${t.id || t.user_id}/billing`);
                    if (!billRes.ok) continue;
                    const bills = await billRes.json();
                    bills.forEach(bill => {
                        bill.tenant_nickname = t.nickname || t.login_id;
                        bill.tenant_color = t.color;
                        bill.tenant_id = t.id || t.user_id;
                        // Fallback to tenant data if bill doesn't have it
                        bill.building_name = bill.building_name || t.building || '-';
                        bill.room_number = bill.room_number || t.room_number || '-';
                        allBills.push(bill);
                    });
                } catch (e) {
                    console.error(`Failed to fetch billing for tenant ${t.id || t.user_id}:`, e);
                }
            }
            billingData = sortBillingData(allBills);

            renderDashboardUI();
            } catch (err) {
                console.error('Dashboard 로드 오류:', err);
                const container = document.getElementById('main-content');
                container.innerHTML = `<div class="empty-state">데이터를 불러오는 중 오류가 발생했습니다.<br><small>${err.message}</small></div>`;
                renderDashboardUI();
            }
        }

        function sortBillingData(data) {
            return data.sort((a, b) => {
                // 1. Check for deposit - always at the absolute bottom
                if (a.type === 'deposit' && b.type !== 'deposit') return 1;
                if (a.type !== 'deposit' && b.type === 'deposit') return -1;

                // 2. Both are same category (both deposit or both non-deposit)
                // Sort by bill_month DESC (latest first at the top)
                const monthA = a.bill_month || '0000-00';
                const monthB = b.bill_month || '0000-00';
                if (monthA !== monthB) {
                    return monthB.localeCompare(monthA);
                }

                // 3. Fallback to ID or matched_amount if months are identical (optional)
                return (b.id || 0) - (a.id || 0);
            });
        }

        async function loadTenantView(tenantId) {
            currentView = 'tenant';

            try {
            const billRes = await fetch(`/api/tenant/${tenantId}/billing`);
            if (!billRes.ok) {
                console.error('Billing API 오류:', billRes.status);
                billingData = [];
            } else {
                billingData = sortBillingData(await billRes.json());
            }

            const calRes = await fetch(`/api/tenant/${tenantId}/calendar-data`);
            if (!calRes.ok) {
                console.error('Calendar API 오류:', calRes.status);
                calendarData = [];
            } else {
                calendarData = await calRes.json();
            }

            renderDashboardUI();
            } catch (err) {
                console.error('Dashboard 로드 오류:', err);
                const container = document.getElementById('main-content');
                container.innerHTML = `<div class="empty-state">데이터를 불러오는 중 오류가 발생했습니다.<br><small>${err.message}</small></div>`;
                renderDashboardUI();
            }
        }

        function renderDashboardUI() {
            const anchor = document.getElementById('sticky-calendar-anchor');
            const container = document.getElementById('main-content');

            anchor.innerHTML = `
                <div class="timeline-container" id="timeline-container">
                    <div class="timeline-header">
                        <div class="calendar-nav">
                            <button onclick="changeTimelineOffset(-6)">‹</button>
                            <span id="timeline-range-label" style="margin: 0 1rem; font-weight: 600; min-width: 80px; text-align: center;">타임라인</span>
                            <button onclick="changeTimelineOffset(6)">›</button>
                        </div>
                        <button class="btn-glass" onclick="resetTimeline()">이번 달로</button>
                    </div>
                    <div class="timeline-scroll-area">
                        <table class="timeline-table">
                            <thead>
                                <tr id="timeline-head-row">
                                    <th class="col-sticky">호실 / 세입자</th>
                                </tr>
                            </thead>
                            <tbody id="timeline-body">
                            </tbody>
                        </table>
                    </div>
                </div>
            `;

            container.innerHTML = `
                <div class="list-container" style="flex: 1; display: flex; flex-direction: column; min-height: 0;">
                    <div class="toggle-container">
                        <button id="btn-unpaid" class="toggle-btn active" onclick="switchListView('unpaid')">미납 현황</button>
                        <button id="btn-recent" class="toggle-btn" onclick="switchListView('recent')">최근 거래 내역</button>
                    </div>
                    <div id="list-scroll-area" class="list-scroll-area">
                        <ul id="unpaid-list" class="item-list"></ul>
                        <ul id="recent-transactions" class="item-list" style="display: none;"></ul>
                    </div>
                </div>
            `;

            renderTimeline();
            renderStats();
            renderRecentTransactions();
            enableDragToScroll();
        }

        function enableDragToScroll() {
            const slider = document.querySelector('.timeline-scroll-area');
            if (!slider) return;
            let isDown = false;
            let startX;
            let scrollLeft;

            slider.addEventListener('mousedown', (e) => {
                isDown = true;
                slider.style.cursor = 'grabbing';
                startX = e.pageX - slider.offsetLeft;
                scrollLeft = slider.scrollLeft;
            });
            slider.addEventListener('mouseleave', () => {
                isDown = false;
                slider.style.cursor = 'grab';
            });
            slider.addEventListener('mouseup', () => {
                isDown = false;
                slider.style.cursor = 'grab';
            });
            slider.addEventListener('mousemove', (e) => {
                if (!isDown) return;
                e.preventDefault();
                const x = e.pageX - slider.offsetLeft;
                const walk = (x - startX) * 2;
                slider.scrollLeft = scrollLeft - walk;
            });
            slider.style.cursor = 'grab';

            // Update year label on scroll
            slider.addEventListener('scroll', updateYearLabel);
        }

        function switchListView(view) {
            const unpaidBtn = document.getElementById('btn-unpaid');
            const recentBtn = document.getElementById('btn-recent');
            const unpaidList = document.getElementById('unpaid-list');
            const recentList = document.getElementById('recent-transactions');

            if (view === 'unpaid') {
                unpaidBtn.classList.add('active');
                recentBtn.classList.remove('active');
                unpaidList.style.display = 'block';
                recentList.style.display = 'none';
            } else {
                recentBtn.classList.add('active');
                unpaidBtn.classList.remove('active');
                recentList.style.display = 'block';
                unpaidList.style.display = 'none';
            }
        }

        let timelineOffsetMonths = 0; // 0 = current month is the newest (rightmost)

        function resetTimeline() {
            timelineOffsetMonths = 0;
            renderTimeline();
        }

        function changeTimelineOffset(delta) {
            // delta = -6 for "이전" (older, more months back), +6 for "최근" (newer)
            // Since months go backwards from current, "이전" increases offset (more past months)
            timelineOffsetMonths -= delta;
            if (timelineOffsetMonths < 0) timelineOffsetMonths = 0;
            renderTimeline();
        }

        function renderTimeline() {
            const headRow = document.getElementById('timeline-head-row');
            const tBody = document.getElementById('timeline-body');
            if (!headRow || !tBody) return;

            // Current month string for highlighting
            const now = new Date();
            const currentMonthStr = `${now.getFullYear()}-${String(now.getMonth() + 1).padStart(2, '0')}`;

            // Generate 12 months in descending order (newest first on left, oldest on right)
            // Left side = newest, right side = oldest
            const months = [];
            const d = new Date();
            d.setMonth(d.getMonth() - timelineOffsetMonths); // newest month
            
            for (let i = 0; i < 12; i++) {
                months.push({
                    val: `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`,
                    label: `${d.getMonth() + 1}월`,
                    isCurrent: `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}` === currentMonthStr
                });
                d.setMonth(d.getMonth() - 1); // go backwards (older)
            }

            // Label will be updated by updateYearLabel() based on scroll position
            updateYearLabel();

            // Setup Header
            headRow.innerHTML = '<th class="col-sticky">호실 / 세입자</th>';
            months.forEach(m => {
                const th = document.createElement('th');
                th.textContent = m.label;
                th.dataset.year = m.val.substring(0, 4);
                if (m.isCurrent) th.className = 'current-month';
                headRow.appendChild(th);
            });

            // Group calendarData
            const rooms = {};
            if (Array.isArray(calendarData)) {
                calendarData.forEach(row => {
                    const rKey = `${row.building_name || ''} ${row.room_number ? row.room_number + '호' : ''}`.trim();
                    if (!rooms[rKey]) rooms[rKey] = {};
                    if (!rooms[rKey][row.contract_id]) {
                        rooms[rKey][row.contract_id] = {
                            tenant_name: row.tenant_nickname || '이름 없음',
                            start: row.contract_start_date || '2000-01-01',
                            end: row.contract_end_date || '2099-12-31',
                            color: row.tenant_color || '#6366f1',
                            invoices: {}
                        };
                    }
                    if (row.bill_month) {
                        rooms[rKey][row.contract_id].invoices[row.bill_month] = {
                            total: row.total_amount || 0,
                            paid: row.paid_amount || 0,
                            dates: row.paid_dates || ''
                        };
                    }
                });
            }

            tBody.innerHTML = '';

            if (Object.keys(rooms).length === 0) {
                tBody.innerHTML = '<tr><td colspan="13" class="empty-state">계약 데이터가 없습니다.</td></tr>';
                return;
            }

            // Render Rows
            for (const [rKey, contracts] of Object.entries(rooms)) {
                // Room Group Header
                const trGroup = document.createElement('tr');
                trGroup.className = 'room-group-row';
                const tdGroup = document.createElement('td');
                tdGroup.colSpan = 13;
                tdGroup.innerHTML = `🏠 ${rKey}`;
                trGroup.appendChild(tdGroup);
                tBody.appendChild(trGroup);

                // Contracts
                for (const [cId, cData] of Object.entries(contracts)) {
                    const tr = document.createElement('tr');
                    tr.className = 'tenant-row';

                    // Sticky Column
                    const tdSticky = document.createElement('td');
                    tdSticky.className = 'col-sticky';
                    tdSticky.innerHTML = `
                        <div class="tenant-name-small" style="color: ${cData.color}">${cData.tenant_name}</div>
                        <div class="tenant-period-small">${cData.start.substring(2).replace(/-/g,'.')} ~ ${cData.end.substring(2).replace(/-/g,'.')}</div>
                    `;
                    tr.appendChild(tdSticky);

                    // Month Columns
                    months.forEach(m => {
                        const td = document.createElement('td');
                        if (m.isCurrent) td.className = 'current-month-cell';
                        
                        // Check if month is within contract
                        const mStr = m.val;
                        const sStr = cData.start.substring(0,7);
                        const eStr = cData.end.substring(0,7);

                        if (mStr < sStr || mStr > eStr) {
                            td.innerHTML = '<span class="badge badge-gray">-</span>';
                            td.title = '계약 기간 외';
                        } else {
                            const inv = cData.invoices[mStr];
                            if (!inv) {
                                td.innerHTML = '<span style="color: rgba(255,255,255,0.3); font-size: 0.7rem;">-</span>';
                            } else {
                                if (inv.paid >= inv.total) {
                                    td.innerHTML = `<span class="badge badge-green">${formatShortDate(inv.dates) || '완납'}</span>`;
                                    td.title = `청구: ${formatCurrency(inv.total)}원 / 완납`;
                                } else if (inv.paid > 0) {
                                    td.innerHTML = `<span class="badge badge-yellow">${formatShortDate(inv.dates)}</span>`;
                                    td.title = `청구: ${formatCurrency(inv.total)}원 / 입금: ${formatCurrency(inv.paid)}원`;
                                } else {
                                    td.innerHTML = '<span class="badge badge-red">미납</span>';
                                    td.title = `청구: ${formatCurrency(inv.total)}원 / 미납`;
                                }
                            }
                        }
                        tr.appendChild(td);
                    });
                    tBody.appendChild(tr);
                }
            }

            // Auto-scroll to the left (newest month) after render
            requestAnimationFrame(() => {
                const scrollArea = document.querySelector('.timeline-scroll-area');
                if (scrollArea) {
                    scrollArea.scrollLeft = 0;
                    updateYearLabel();
                }
            });
        }

        // Update the year label based on which month column is visible right next to the sticky column
        function updateYearLabel() {
            const scrollArea = document.querySelector('.timeline-scroll-area');
            const label = document.getElementById('timeline-range-label');
            const headRow = document.getElementById('timeline-head-row');
            if (!scrollArea || !label || !headRow) return;

            // Get all month header cells (skip the sticky column)
            const ths = headRow.querySelectorAll('th:not(.col-sticky)');
            if (ths.length === 0) return;

            // The sticky column width
            const stickyCol = headRow.querySelector('.col-sticky');
            const stickyWidth = stickyCol ? stickyCol.offsetWidth : 130;

            // Find which month header is closest to the right edge of the sticky column
            const scrollLeft = scrollArea.scrollLeft;
            const viewportLeft = scrollLeft + stickyWidth;
            
            let visibleTh = null;
            for (const th of ths) {
                const thLeft = th.offsetLeft;
                const thRight = thLeft + th.offsetWidth;
                if (thRight > viewportLeft) {
                    visibleTh = th;
                    break;
                }
            }

            if (visibleTh) {
                // Use data-year attribute
                const year = visibleTh.dataset.year;
                if (year) {
                    label.textContent = `${year}년`;
                }
            }
        }

        function formatShortDate(datesStr) {
            if (!datesStr) return '';
            const parts = datesStr.split(',')[0].split('-'); // take first date
            if (parts.length >= 3) return `${parts[1]}.${parts[2]}`;
            return datesStr;
        }

        function renderStats() {
            const unpaidBills = billingData.filter(b => {
                const paid = b.payments.reduce((sum, p) => sum + p.matched_amount, 0);
                return paid < b.total_amount;
            });

            const list = document.getElementById('unpaid-list');
            if (!list) return;

            if (unpaidBills.length === 0) {
                list.innerHTML = `<div class="empty-state">미납 내역이 없습니다.</div>`;
                return;
            }

            list.innerHTML = unpaidBills.map(b => {
                const paid = b.payments.reduce((sum, p) => sum + p.matched_amount, 0);
                const name = user.role === 'landlord' ? b.tenant_nickname : user.nickname;
                const building = b.building_name || b.building || '-';
                const room = b.room_number || b.room || '-';

                const paidMan = Math.floor(paid / 10000);
                const totalMan = Math.floor(b.total_amount / 10000);

                const metaText = b.type === 'deposit' ? '보증금' : `${b.bill_month}분`;

                return `
                    <li class="item-row">
                        <div class="item-summary">
                            <div class="room-badge">
                                <div class="b-name">${building}</div>
                                <div class="r-num">${room}</div>
                            </div>
                            <div class="item-content-group">
                                <div class="item-title-row">
                                    <span class="item-title">${name}</span>
                                    <span class="item-status unpaid">미납</span>
                                </div>
                                <div class="item-meta">
                                    <span>${metaText}</span>
                                </div>
                            </div>
                            <div class="item-amount">
                                ${paidMan} / ${totalMan}
                                <div class="amount-detail">단위: 만원</div>
                            </div>
                        </div>
                    </li>
                `;
            }).join('');
        }

        function renderRecentTransactions() {
            const list = document.getElementById('recent-transactions');
            if (!list) return;

            const recentBills = billingData.slice(0, 10);
            if (recentBills.length === 0) {
                list.innerHTML = `<div class="empty-state">내역이 없습니다.</div>`;
                return;
            }

            list.innerHTML = recentBills.map(b => {
                const paid = b.payments.reduce((sum, p) => sum + p.matched_amount, 0);
                const status = paid >= b.total_amount ? 'paid' : 'unpaid';
                const statusLabel = status === 'paid' ? '완납' : '미납';
                const name = user.role === 'landlord' ? b.tenant_nickname : user.nickname;
                const building = b.building_name || b.building || '-';
                const room = b.room_number || b.room || '-';

                const paidMan = Math.floor(paid / 10000);
                const totalMan = Math.floor(b.total_amount / 10000);

                const metaText = b.type === 'deposit' ? '보증금' : `${b.bill_month}분`;

                return `
                    <li class="item-row">
                        <div class="item-summary">
                            <div class="room-badge">
                                <div class="b-name">${building}</div>
                                <div class="r-num">${room}</div>
                            </div>
                            <div class="item-content-group">
                                <div class="item-title-row">
                                    <span class="item-title">${name}</span>
                                    <span class="item-status ${status}">${statusLabel}</span>
                                </div>
                                <div class="item-meta">
                                    <span>${metaText}</span>
                                </div>
                            </div>
                            <div class="item-amount">
                                ${paidMan} / ${totalMan}
                                <div class="amount-detail">단위: 만원</div>
                            </div>
                        </div>
                    </li>
                `;
            }).join('');
        }

        // Context Menu Logic
        function showContextMenu(e, billId) {
            e.preventDefault();
            selectedBillId = billId;
            const menu = document.getElementById('context-menu');
            menu.style.display = 'block';
            menu.style.left = `${e.pageX}px`;
            menu.style.top = `${e.pageY}px`;

            document.addEventListener('click', () => {
                menu.style.display = 'none';
            }, { once: true });
        }

        async function adjustDate(type) {
            if (!selectedBillId) return;
            alert(`${type} 조정 기능은 백엔드 연결 후 제공됩니다.`);
            await init();
        }

        function showDayDetail(dateStr) {
            const modal = document.getElementById('day-detail-modal');
            const title = document.getElementById('modal-date-title');
            const list = document.getElementById('modal-event-list');

            const dateObj = new Date(dateStr);
            title.textContent = `${dateObj.getFullYear()}년 ${dateObj.getMonth() + 1}월 ${dateObj.getDate()}일`;
            list.innerHTML = '';

            const dayEvents = [];
            if (Array.isArray(calendarData)) {
                const addedKeys = new Set();

                calendarData.forEach(data => {
                    const roomInfo = `${data.building_name || ''} ${data.room_number ? data.room_number + '호' : ''}`.trim();
                    const tenantName = data.tenant_nickname || '정보 없음';

                    if (data.contract_start_date === dateStr) {
                        const key = `start-${data.contract_id}`;
                        if (!addedKeys.has(key)) {
                            addedKeys.add(key);
                            dayEvents.push({ icon: '▶', title: '계약 시작', meta: `임차인: ${tenantName}<br>건물: ${roomInfo}`, color: data.tenant_color });
                        }
                    }

                    if (data.contract_end_date === dateStr) {
                        const key = `end-${data.contract_id}`;
                        if (!addedKeys.has(key)) {
                            addedKeys.add(key);
                            dayEvents.push({ icon: '◀', title: '계약 종료', meta: `임차인: ${tenantName}<br>건물: ${roomInfo}`, color: data.tenant_color });
                        }
                    }

                    const isDue = data.due_date === dateStr;
                    const paidDates = data.paid_dates ? data.paid_dates.split(',') : [];
                    const isPaidToday = paidDates.includes(dateStr);

                    if (isDue && isPaidToday) {
                        dayEvents.push({ icon: '◎', title: '청구 및 납부', meta: `임차인: ${tenantName}<br>건물: ${roomInfo}<br>청구액: ${formatCurrency(data.total_amount)}원`, color: data.tenant_color });
                    } else {
                        if (isDue) {
                            dayEvents.push({ icon: '○', title: '임대료 청구', meta: `임차인: ${tenantName}<br>건물: ${roomInfo}<br>청구액: ${formatCurrency(data.total_amount)}원`, color: data.tenant_color });
                        }
                        if (isPaidToday) {
                            dayEvents.push({ icon: '●', title: '납부 완료', meta: `임차인: ${tenantName}<br>건물: ${roomInfo}`, color: data.tenant_color });
                        }
                    }
                });
            }

            if (dayEvents.length === 0) {
                list.innerHTML = '<div class="empty-state" style="padding: 1rem 0;">일정이 없습니다.</div>';
            } else {
                dayEvents.forEach(ev => {
                    const div = document.createElement('div');
                    div.className = 'event-detail-item';
                    if (ev.color) div.style.borderLeftColor = ev.color;
                    div.innerHTML = `
                        <div class="event-detail-title"><span style="color:${ev.color}">${ev.icon}</span> ${ev.title}</div>
                        <div class="event-detail-meta" style="color: rgba(255, 255, 255, 0.7);">${ev.meta}</div>
                    `;
                    list.appendChild(div);
                });
            }

            // Add "Check-out Today" button at the bottom of the list
            const checkoutBtn = document.createElement('button');
            checkoutBtn.className = 'btn-glass';
            checkoutBtn.style.width = '100%';
            checkoutBtn.style.marginTop = '1rem';
            checkoutBtn.textContent = '오늘 퇴실 관리';
            checkoutBtn.onclick = () => {
                window.location.href = `/checkout_management.html?date=${dateStr}`;
            };
            list.appendChild(checkoutBtn);

            modal.style.display = 'flex';
        }

        function closeDayModal() {
            document.getElementById('day-detail-modal').style.display = 'none';
        }
    </script>
</body>
